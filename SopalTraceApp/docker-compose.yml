services:
  sopaltrace.api:
    image: ${DOCKER_REGISTRY-}sopaltraceapi
    build:
      context: .
      dockerfile: SopalTrace.Api/Dockerfile
    ports:
      - "9091:8080" 
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SopalTraceConnection=Server=sqlserver,1433;Database=SopalTraceDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - EmailSettings__SmtpServer=${SMTP_SERVER}
      - EmailSettings__Port=${SMTP_PORT}
      - EmailSettings__SmtpUsername=${SMTP_USERNAME} 
      - EmailSettings__SenderEmail=${EMAIL_SENDER}
      - EmailSettings__AppPassword=${EMAIL_PASSWORD}
      - EmailSettings__SenderName=SopalTrace Production
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    env_file:          
      - .env
    environment:
      - ACCEPT_EULA=Y  
      - MSSQL_PID=Developer
      - SA_PASSWORD=${DB_PASSWORD}

    ports:
      - "1444:1433" 
    volumes:
      - sopal_db_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -Q \"SELECT 1\" -C"]
      interval: 10s
      timeout: 5s
      retries: 5

  sopaltrace.web:
    build:
      context: ../SopalTraceWeb  # <-- Les deux points ".." pour reculer
      dockerfile: Dockerfile     # <-- AJOUT : On force le nom exact du fichier
      target: build-stage
    container_name: sopaltrace-web-dev
    ports:
      - "5173:5173"
    volumes:
      - ../SopalTraceWeb:/app    # <-- Le chemin est correct ici pour le volume
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host

volumes:
  sopal_db_data: